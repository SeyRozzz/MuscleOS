# ═══════════════════════════════════════════════════════════
# MassBuilder PRO — Configuration Nginx
# Testé sur Nginx 1.20+
# ═══════════════════════════════════════════════════════════

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name muscleos.app www.muscleos.app;

    # ACME challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Bloc HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name muscleos.app www.muscleos.app;

    # ── SSL / TLS ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/muscleos.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/muscleos.app/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Protocoles sécurisés uniquement (TLS 1.2+ recommandé)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ── Racine ────────────────────────────────────────────
    root /var/www/massbuilder;
    index index.html;

    # ── Logs ──────────────────────────────────────────────
    access_log /var/log/nginx/massbuilder_access.log;
    error_log  /var/log/nginx/massbuilder_error.log warn;

    # ── Sécurité headers ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;" always;

    # Masquer version Nginx
    server_tokens off;
    more_clear_headers Server;

    # ── Compression ───────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/html
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2
        font/woff;

    # ── Cache statique ────────────────────────────────────
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location ~* \.(woff2|woff|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── Protection fichiers sensibles ─────────────────────
    location ~ /\.(ht|git|env) {
        deny all;
        return 404;
    }

    # ── Route principale (SPA-ready) ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Rate limiting ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=main:10m rate=30r/m;
    limit_req zone=main burst=10 nodelay;

    # ── Taille max requête ────────────────────────────────
    client_max_body_size 1m;
}
